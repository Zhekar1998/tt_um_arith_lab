name: gds

on:
  push:
  workflow_dispatch:

jobs:
  gds:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up environment variables
        shell: bash
        run: |
          cat << __EOF >> "$GITHUB_ENV"
          PDK=gf180mcuD
          PDK_ROOT=/home/runner/pdk
          TT_ARGS=--gf
          GF180_CIEL_VERSION=54435919abffb937387ec956209f9cf5fd2dfbee
          __EOF

      - name: Install prerequisites
        uses: awalsh128/cache-apt-pkgs-action@v1.4.3
        with:
          packages: librsvg2-bin pngquant ghdl-llvm
          version: tinytapeout_gds_action

      - name: Checkout tt-support-tools repo
        uses: actions/checkout@v6
        with:
          repository: TinyTapeout/tt-support-tools
          ref: main
          path: tt

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install tt-support-tools dependencies
        shell: bash
        run: pip install -r tt/requirements.txt

      - name: Install LibreLane
        shell: bash
        run: pip install librelane==3.0.3

      - name: Fetch GF180 PDK
        shell: bash
        run: ciel fetch --pdk-root "$PDK_ROOT" --pdk-family gf180mcu -l all "$GF180_CIEL_VERSION"

      - name: Checkout Avalon AS-3V3 SCL
        uses: actions/checkout@v6
        with:
          repository: AvalonSemiconductors/gf180mcu_as_sc_mcu7t3v3
          path: avalon_scl

      - name: Install Avalon AS-3V3 SCL into PDK
        shell: bash
        run: |
          set -euo pipefail
          scl=gf180mcu_as_sc_mcu7t3v3
          pdk_dir="$PDK_ROOT/ciel/gf180mcu/versions/$GF180_CIEL_VERSION/gf180mcuD"

          test -d "$pdk_dir"
          test -d "avalon_scl/pdk/libs.ref/$scl"
          test -d "avalon_scl/pdk/libs.tech/librelane/$scl"

          mkdir -p \
            "$pdk_dir/libs.ref" \
            "$pdk_dir/libs.tech/librelane" \
            "$pdk_dir/libs.tech/openlane" \
            "$pdk_dir/libs.tech/magic"

          cp -a "avalon_scl/pdk/libs.ref/$scl" "$pdk_dir/libs.ref/"
          cp -a "avalon_scl/pdk/libs.tech/librelane/$scl" "$pdk_dir/libs.tech/librelane/"
          cp -a "avalon_scl/pdk/libs.tech/librelane/$scl" "$pdk_dir/libs.tech/openlane/"
          cp -a "avalon_scl/pdk/libs.tech/librelane/$scl/synth_exclude.cells" "$pdk_dir/libs.tech/openlane/$scl/no_synth.cells"
          cp -a "avalon_scl/pdk/libs.tech/librelane/$scl/pnr_exclude.cells" "$pdk_dir/libs.tech/openlane/$scl/drc_exclude.cells"

          if [ -f avalon_scl/pdk/libs.tech/magic/gf180mcuD.magicrc ]; then
            cp -a avalon_scl/pdk/libs.tech/magic/gf180mcuD.magicrc "$pdk_dir/libs.tech/magic/$scl.magicrc"
          elif [ -d "avalon_scl/pdk/libs.tech/magic/$scl" ]; then
            cp -a "avalon_scl/pdk/libs.tech/magic/$scl" "$pdk_dir/libs.tech/magic/"
          fi

          test -f "$pdk_dir/libs.ref/$scl/techlef/${scl}__nom.tlef"
          test -f "$pdk_dir/libs.ref/$scl/lef/${scl}.lef"
          test -f "$pdk_dir/libs.ref/$scl/lib/${scl}__tt_025C_3v30.lib"

      - name: Preserve project user config
        shell: bash
        run: cp src/user_config.json /tmp/tt_project_user_config.json

      - name: Fetch verilog and build config
        shell: bash
        run: ./tt/tt_tool.py --create-user-config $TT_ARGS

      - name: Restore project user config
        shell: bash
        run: cp /tmp/tt_project_user_config.json src/user_config.json

      - name: Make GDS with LibreLane
        shell: bash
        run: ./tt/tt_tool.py --harden $TT_ARGS

      - name: Show build files (for debugging)
        if: success() || failure()
        shell: bash
        run: find runs/wokwi/

      - name: Linter output
        if: success() || failure()
        shell: bash
        run: |
          LINTER_LOG=(runs/wokwi/*-verilator-lint/verilator-lint.log)
          LINTER_LOG=${LINTER_LOG[0]}

          echo "DEBUG LINTER_LOG *$LINTER_LOG*"
          cat "$LINTER_LOG"
          echo "END DEBUG"

          if [ -s "$LINTER_LOG" ]; then
            set +e
            count_error=$(egrep -i "^%Error" "$LINTER_LOG" | wc -l)
            count_warn=$(egrep -i "^%Warning" "$LINTER_LOG" | wc -l)
            count_other=$(egrep -i "^%" "$LINTER_LOG" | egrep -v "%(Warning|Error)" | wc -l)
            set -e

            open=""
            summary=""
            icon=":green_circle:"
            if [ "$count_other" -gt 0 ]; then
              summary="$count_other message(s)"
              icon=":orange_circle:"
            fi
            if [ "$count_warn" -gt 0 ]; then
              summary="$count_warn warning(s)"
              icon=":orange_circle:"
            fi
            if [ "$count_error" -gt 0 ]; then
              summary="$count_error error(s)"
              icon=":red_circle:"
              open="open"
            fi
            if [ -n "$summary" ]; then
              summary="[$summary]"
            fi

            echo "<details ${open}>" >> "$GITHUB_STEP_SUMMARY"
            echo "<summary><h1>Linter output&nbsp;&nbsp;<h4>${summary} ${icon}</h4></h1></summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "<pre>" >> "$GITHUB_STEP_SUMMARY"
            sed 's/^/    /' < "$LINTER_LOG" >> "$GITHUB_STEP_SUMMARY"
            echo "</pre>" >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Yosys warnings
        shell: bash
        run: ./tt/tt_tool.py --print-warnings $TT_ARGS >> "$GITHUB_STEP_SUMMARY"

      - name: Routing summary
        shell: bash
        run: ./tt/tt_tool.py --print-stats $TT_ARGS >> "$GITHUB_STEP_SUMMARY"

      - name: Cell usage summary
        shell: bash
        run: ./tt/tt_tool.py --print-cell-category $TT_ARGS >> "$GITHUB_STEP_SUMMARY"

      - name: Publish build logs
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: GDS_logs
          path: |
            src/*
            runs/wokwi/*

      - name: Prepare tt_submission artifact
        shell: bash
        run: ./tt/tt_tool.py --create-tt-submission $TT_ARGS

      - name: Publish tt_submission artifact
        uses: actions/upload-artifact@v7
        with:
          name: tt_submission
          path: |
            src/*
            docs/*
            tt_submission/*
            info.yaml
            LICENSE

      - name: Render PNG from GDS
        shell: bash
        run: './tt/tt_tool.py --create-png $TT_ARGS 2>&1 || echo "WARNING: Failed to render PNG preview from GDS; error $?"'

      - name: Upload gds_render (png) artifact
        uses: actions/upload-artifact@v7
        with:
          name: gds_render
          path: gds_render.png

  precheck:
    needs: gds
    runs-on: ubuntu-24.04
    steps:
      - name: Run Tiny Tapeout Precheck
        uses: TinyTapeout/tt-gds-action/precheck@ttgf26a

  gl_test:
    needs: gds
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: GL test
        uses: TinyTapeout/tt-gds-action/gl_test@ttgf26a

  viewer:
    needs: gds
    runs-on: ubuntu-24.04
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source
    steps:
      - uses: TinyTapeout/tt-gds-action/viewer@ttgf26a
